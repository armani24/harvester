name: CadQuery Render

on: [push]

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install cadquery cadquery-ocp-novtk

      - name: Generate STL
        run: |
          python designs/shaker_part.py

      - name: Upload STL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadquery-output
          path: designs/**/*.stl
