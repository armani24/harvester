name: CadQuery Render
on: [push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install CadQuery
        run: |
          pip install cadquery-ocp-novtk cadquery

      - name: Generate STL
        run: |
          # Runs all scripts in your designs folder
          python designs/shaker_part.py

      - name: Upload STL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: harvester-parts
          path: ./*.stl

